version: '3.8'

services:
  mongodb:
    image: mongo:6.0
    container_name: vplay_mongodb
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  bot:
    build: .
    container_name: vplay_bot
    restart: always
    depends_on:
      - mongodb
    env_file:
      - .env
    environment:
      - MONGO_URI=mongodb://mongodb:27017/vplay_bot
    volumes:
      - ./downloads:/app/downloads

volumes:
  mongo_data:
